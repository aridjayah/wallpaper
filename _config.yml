# Welcome to Jekyll!
# 
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: Aridjaya
email: https://aridjaya.com/wallpaper
description: > # this means to ignore newlines until "baseurl:"
  A collection of high-quality HD, Full HD, and 4K wallpapers featuring stunning nature landscapes, mountains, forests, beaches, sunsets, city views, and aesthetic designs. All wallpapers are carefully selected for clarity and beauty, and optimized for desktop and mobile devices. Enjoy fresh, stylish backgrounds and download your favorite wallpapers for free anytime.
  
  
# baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://aridjaya.com/wallpaper" # the base hostname & protocol for your site

# post for future
future: false
timezone: Asia/Jakarta

# sidebar
default-image: logo.jpg # If there is no featured image in a post then this image will be showed. Also on all pages this image will be showed. Use a 500x250 image.

# footer

built-by: aridjaya

copyright:
   name: aridjaya
   link: 'https://aridjaya.com/wallpaper'

# Build settings
markdown: kramdown
permalink: /:title/
paginate: 6
paginate_path: /page:num/

# Tracker
analytics: UA-83979019-1

# Comments
disqus: yes
disqus-shortname: aridjaya

# social
facebook: https://aridjaya.com/wallpaper
quora: https://aridjaya.com/wallpaper
twitter: https://aridjaya.com/wallpaper
github: https://aridjaya.com/wallpaper
email: https://aridjaya.com/wallpaper

# Sass style
sass:
  style: compressed

# Ruby Gems
plugins: 
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap


