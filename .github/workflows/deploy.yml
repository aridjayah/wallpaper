name: Jekyll Deploy + SEO Auto Ping + IndexNow

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby (NO AUTO BUNDLER CACHE)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Bundler
        run: gem install bundler

      - name: Force disable deployment mode (CRITICAL)
        run: |
          bundle config unset deployment
          bundle config unset frozen
          bundle config set --local path vendor/bundle

      - name: Install dependencies (SAFE MODE)
        run: bundle install --jobs 4 --retry 3

      - name: Build Jekyll
        run: bundle exec jekyll build

      # =========================
      # 🔵 SEO PING
      # =========================
      - name: Ping Search Engines
        run: |
          SITE="https://aridjaya.com/wallpaper"

          curl "https://www.google.com/ping?sitemap=${SITE}/sitemap.xml"
          curl "https://www.bing.com/ping?sitemap=${SITE}/sitemap.xml"

      # =========================
      # ⚡ INDEXNOW
      # =========================
      - name: IndexNow Submit
        run: |
          SITE="https://aridjaya.com/wallpaper"
          KEY="639671a75c2147f593d1fbee7b1162d1"

          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d '{
            "host": "aridjaya.com",
            "key": "'"$KEY"'",
            "urlList": [
              "'"$SITE"/'",
              "'"$SITE"/sitemap.xml'"
            ]
          }'