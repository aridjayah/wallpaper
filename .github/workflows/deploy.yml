name: Jekyll Deploy Safe

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Bundler
        run: gem install bundler

      - name: Install dependencies (SAFE MODE)
        run: bundle install

      - name: Build site
        run: bundle exec jekyll build