name: Jekyll Deploy Stable

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 🚀 MANUAL RUBY (NO setup-ruby)
      # =========================
      - name: Setup Ruby
        uses: actions/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Bundler
        run: gem install bundler

      # =========================
      # 🧹 FORCE CLEAN STATE
      # =========================
      - name: Clean environment
        run: |
          rm -rf vendor Gemfile.lock _site .jekyll-cache

      # =========================
      # 📦 INSTALL CLEAN MODE
      # =========================
      - name: Install dependencies
        run: bundle install

      # =========================
      # 🏗️ BUILD
      # =========================
      - name: Build Jekyll
        run: bundle exec jekyll build