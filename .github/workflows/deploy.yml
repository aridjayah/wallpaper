name: Jekyll Deploy + SEO Auto Ping + IndexNow

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll
        run: bundle exec jekyll build

      # =========================
      # 🔵 GOOGLE + BING PING (SITEMAP + RSS)
      # =========================
      - name: Ping Google + Bing
        run: |
          SITE="https://aridjaya.com/wallpaper"

          echo "🔵 Google Sitemap Ping"
          curl "https://www.google.com/ping?sitemap=${SITE}/sitemap-index.xml"

          echo "🔵 Bing Sitemap Ping"
          curl "https://www.bing.com/ping?sitemap=${SITE}/sitemap-index.xml"

          echo "🟢 Google RSS Ping"
          curl "https://www.google.com/ping?sitemap=${SITE}/feed.xml"

          echo "🟢 Bing RSS Ping"
          curl "https://www.bing.com/ping?sitemap=${SITE}/feed.xml"

      # =========================
      # ⚡ INDEXNOW (BING + YANDEX REAL-TIME)
      # =========================
      - name: IndexNow Submit
        run: |
          SITE="https://aridjaya.com/wallpaper"
          KEY="639671a75c2147f593d1fbee7b1162d1"

          echo "⚡ Submitting IndexNow"

          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d '{
            "host": "aridjaya.com/wallpaper",
            "key": "'"$KEY"'",
            "urlList": [
              "'"$SITE"'/",
              "'"$SITE"'/feed.xml",
              "'"$SITE"'/sitemap-index.xml"
            ]
          }'

          echo "✅ IndexNow Done"