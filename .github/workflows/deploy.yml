name: Jekyll Deploy + SEO Auto Ping + IndexNow

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Unfreeze bundler
        run: bundle config unset deployment

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll
        run: bundle exec jekyll build

      # =========================
      # 🔵 GOOGLE + BING PING
      # =========================
      - name: Ping Search Engines
        run: |
          SITE="https://aridjaya.com/wallpaper"

          echo "🔵 Google Ping"
          curl "https://www.google.com/ping?sitemap=${SITE}/sitemap.xml"

          echo "🔵 Bing Ping"
          curl "https://www.bing.com/ping?sitemap=${SITE}/sitemap.xml"

      # =========================
      # ⚡ INDEXNOW FIXED
      # =========================
      - name: IndexNow Submit
        run: |
          SITE="https://aridjaya.com/wallpaper"
          KEY="639671a75c2147f593d1fbee7b1162d1"

          echo "⚡ IndexNow Submit"

          curl -X POST "https://api.indexnow.org/indexnow" \
          -H "Content-Type: application/json" \
          -d '{
            "host": "aridjaya.com",
            "key": "'"$KEY"'",
            "urlList": [
              "'"$SITE"/'",
              "'"$SITE"/sitemap.xml'"
            ]
          }'

          echo "✅ IndexNow Done"